<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabSpace - Real-time Collaboration Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">
                <i class="fa-solid fa-file-pen logo-icon"></i>
                <span>CollabSpace</span>
            </div>
        </div>
        <div class="nav-center">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="Search documents, comments, or team members...">
            </div>
        </div>
        <div class="nav-right">
            <button class="icon-btn" title="Notifications"><i class="fa-regular fa-bell"></i></button>
            <button class="icon-btn" title="Settings"><i class="fa-solid fa-gear"></i></button>
            <div class="profile-avatar" title="Your Profile">A</div>
        </div>
    </nav>

    <div class="app-container">
        
        <aside class="sidebar">
            <button class="btn-primary" id="new-doc-btn">
                <i class="fa-solid fa-plus"></i> New Document
            </button>
            <div class="sidebar-section">
                <h3>Recent Documents</h3>
                <ul class="doc-list" id="document-list">
                    </ul>
            </div>
        </aside>

        <main class="editor-area">
            <div class="editor-header">
                <input type="text" id="doc-title-input" class="doc-title" value="DBMS Notes" placeholder="Untitled Document">
                <div class="autosave-container">
                    <span id="save-status" class="status-saved">
                        <i class="fa-solid fa-cloud-check"></i> All changes saved to cloud
                    </span>
                </div>
            </div>
            <div class="editor-body">
                <textarea id="doc-textarea" placeholder="Start typing your thoughts, notes, or documentation here..."></textarea>
            </div>
            <div class="editor-footer">
                <div class="meta-item"><i class="fa-solid fa-font"></i> <span id="word-count">0</span> words</div>
                <div class="meta-item"><i class="fa-solid fa-text-width"></i> <span id="char-count">0</span> characters</div>
            </div>
        </main>

        <aside class="right-panel">
            <div class="panel-card">
                <div class="card-header">
                    <h3><i class="fa-solid fa-users text-primary"></i> Collaborators</h3>
                    <span class="badge" id="online-count">3 Online</span>
                </div>
                <div class="collaborators-list" id="collaborators-container">
                    </div>
            </div>

            <div class="panel-card comments-card">
                <div class="card-header">
                    <h3><i class="fa-regular fa-comment-dots text-primary"></i> Comments</h3>
                </div>
                <div class="comments-list" id="comments-container">
                    </div>
                <form class="comment-input-form" id="comment-form">
                    <input type="text" id="new-comment-text" placeholder="Add a comment..." required>
                    <button type="submit" class="btn-send" title="Send comment">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </aside>

    </div>

    <script src="script.js"></script>
</body>
</html>
